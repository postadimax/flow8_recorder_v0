name: flow8_recorder
description: Recording app for Behringer Flow 8
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  record: 5.1.0
  path_provider: 2.1.2
  permission_handler: 11.3.1

# Questo dice a Flutter: "Non m'interessa cosa vorresti scaricare, USA QUESTE"
dependency_overrides:
  record_platform_interface: 1.4.0
  record_linux: 0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
